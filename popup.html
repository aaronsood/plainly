<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plainly</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0f;
    --surface: #18181b;
    --surface2: #222226;
    --border: #2e2e33;
    --text: #e8e8ea;
    --muted: #71717a;
    --accent: #a78bfa;
    --accent-dim: #7c3aed22;
    --green: #4ade80;
    --red: #f87171;
    --amber: #fbbf24;
  }

  body {
    width: 380px;
    min-height: 200px;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    line-height: 1.6;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px 12px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 600;
    font-size: 15px;
    letter-spacing: -0.3px;
  }

  .logo-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
  }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    background: var(--surface2);
    padding: 3px 8px;
    border-radius: 20px;
    border: 1px solid var(--border);
  }

  .status-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
  }
  .status-dot.ready { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .status-dot.loading { background: var(--amber); animation: pulse 1s infinite; }
  .status-dot.error { background: var(--red); }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .modes {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
  }

  .mode-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 4px;
    cursor: pointer;
    text-align: center;
    color: var(--muted);
    font-size: 10px;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
  }

  .mode-btn svg {
    width: 15px;
    height: 15px;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.75;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .mode-btn:hover { border-color: var(--accent); color: var(--text); }
  .mode-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

  .analyse-btn {
    margin: 0 14px 12px;
    width: calc(100% - 28px);
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 11px;
    font-size: 14px;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: -0.2px;
  }

  .analyse-btn:hover:not(:disabled) { background: #8b5cf6; transform: translateY(-1px); }
  .analyse-btn:active { transform: translateY(0); }
  .analyse-btn:disabled { background: var(--surface2); color: var(--muted); cursor: not-allowed; transform: none; }

  .loading-bar-wrap {
    padding: 0 14px 12px;
    display: none;
  }
  .loading-bar-wrap.visible { display: block; }

  .loading-label {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
  }

  .loading-bar {
    height: 3px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }

  .loading-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    width: 0%;
    transition: width 0.4s ease;
  }

  .output-area {
    padding: 0 14px 14px;
    display: none;
  }
  .output-area.visible { display: block; }

  .output-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .output-label {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .copy-btn {
    display: flex;
    align-items: center;
    gap: 4px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px 8px;
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .copy-btn svg { width: 11px; height: 11px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
  .copy-btn.copied { border-color: var(--green); color: var(--green); }

  .output-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    font-size: 13px;
    line-height: 1.75;
    color: var(--text);
    max-height: 280px;
    overflow-y: auto;
    word-break: break-word;
  }

  .output-box p { margin-bottom: 8px; }
  .output-box p:last-child { margin-bottom: 0; }
  .output-box strong { color: #fff; font-weight: 600; }
  .output-box ul, .output-box ol { padding-left: 16px; margin-bottom: 8px; }
  .output-box li { margin-bottom: 4px; }
  .output-box h1, .output-box h2, .output-box h3 { font-weight: 600; color: #fff; margin-bottom: 6px; }

  .output-box::-webkit-scrollbar { width: 4px; }
  .output-box::-webkit-scrollbar-track { background: transparent; }
  .output-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .cached-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 6px;
    margin-bottom: 8px;
  }
  .cached-badge svg { width: 10px; height: 10px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  .cursor {
    display: inline-block;
    width: 2px;
    height: 13px;
    background: var(--accent);
    animation: blink 0.7s infinite;
    vertical-align: middle;
    margin-left: 1px;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  .error-state {
    padding: 10px 12px;
    background: #2a1a1a;
    border: 1px solid #4a1a1a;
    border-radius: 10px;
    font-size: 12px;
    color: var(--red);
    line-height: 1.5;
  }

  .privacy-note {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    font-size: 11px;
    color: var(--green);
    border-top: 1px solid var(--border);
  }
  .privacy-note svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
</style>
</head>
<body>

  <div class="header">
    <div class="logo">
      <div class="logo-dot"></div>
      Plainly
    </div>
    <div class="status-pill">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">loading model...</span>
    </div>
  </div>

  <div class="modes">
    <button class="mode-btn active" data-mode="summarise">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      Summarise
    </button>
    <button class="mode-btn" data-mode="eli5">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      Simple
    </button>
    <button class="mode-btn" data-mode="redflags">
      <svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      Red flags
    </button>
    <button class="mode-btn" data-mode="keyfacts">
      <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      Key facts
    </button>
    <button class="mode-btn" data-mode="trustcheck">
      <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      Trust
    </button>
  </div>

  <button class="analyse-btn" id="analyseBtn" disabled>Analyse this page</button>

  <div class="loading-bar-wrap" id="loadingBarWrap">
    <div class="loading-label">
      <span id="loadingText">Downloading AI model (one time only)...</span>
      <span id="loadingPct">0%</span>
    </div>
    <div class="loading-bar">
      <div class="loading-bar-fill" id="loadingBarFill"></div>
    </div>
  </div>

  <div class="output-area" id="outputArea">
    <div class="output-header">
      <div class="output-label" id="outputLabel">Summary</div>
      <button class="copy-btn" id="copyBtn" style="display:none">
        <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        copy
      </button>
    </div>
    <div id="cachedBadge" class="cached-badge" style="display:none">
      <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      cached result
    </div>
    <div class="output-box" id="outputBox"></div>
  </div>

  <div class="privacy-note">
    <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    Runs entirely on your device — nothing leaves your browser
  </div>

  <script src="popup.js"></script>
</body>
</html>
